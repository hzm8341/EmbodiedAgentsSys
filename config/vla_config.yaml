# VLA Configuration
# VLA (Vision-Language-Action) 模型配置

lerobot:
  # LeRobot VLA 适配器配置
  policy_name: "default_policy"
  checkpoint: null  # 模型检查点路径
  host: "127.0.0.1"
  port: 8080
  action_dim: 7  # 7 DOF 机械臂

# VLA 模型类型
vla_type: "lerobot"  # lerobot, act, gr00t

# 推理配置
inference:
  batch_size: 1
  max_steps: 100
  timeout: 30.0

# 技能配置
skills:
  max_retries: 3
  observation_timeout: 5.0
