# Whitelist configuration for allowed robot actions
# Defines which actions are permitted, required parameters, and constraints

allowed_actions:
  move_to:
    description: "Move robot arm to target position"
    dangerous: true
    required_params:
      target_pose:
        type: list
        length: 3
        description: "Target position [x, y, z]"
      speed:
        type: float
        min: 0.01
        max: 1.0
        description: "Movement speed (0.01 to 1.0 m/s)"
    optional_params:
      approach:
        type: enum
        values: ["linear", "cartesian", "joint"]
        description: "Approach method"

  gripper_open:
    description: "Open robot gripper"
    dangerous: false
    required_params: {}
    optional_params: {}

  gripper_close:
    description: "Close robot gripper with specified force"
    dangerous: false
    required_params:
      force:
        type: float
        min: 0
        max: 100
        description: "Grip force (0 to 100 N)"
    optional_params: {}

  vision_capture:
    description: "Capture image from robot camera"
    dangerous: false
    required_params: {}
    optional_params: {}

  emergency_stop:
    description: "Emergency stop all robot operations"
    dangerous: true
    required_params: {}
    optional_params: {}
