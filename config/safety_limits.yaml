# config/safety_limits.yaml - Physical safety boundary definitions

workspace:
  x:
    min: 0.1
    max: 1.5
    unit: meters
  y:
    min: -1.0
    max: 1.0
    unit: meters
  z:
    min: 0.0
    max: 2.0
    unit: meters

gripper_limits:
  min_force: 0
  max_force: 100
  unit: N

motor_limits:
  max_linear_speed: 1.0    # m/s
  max_angular_speed: 90.0  # deg/s
