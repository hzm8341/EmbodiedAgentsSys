<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>VLAPlus Web Scene Viewer</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 16px;
        background: #0f172a;
        color: #e5e7eb;
      }
      h1 {
        margin-bottom: 8px;
      }
      .container {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .panel {
        background: #020617;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.7);
        border: 1px solid #1e293b;
        flex: 1 1 320px;
        min-width: 0;
      }
      video {
        width: 100%;
        border-radius: 8px;
        background: #020617;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 14px;
        color: #9ca3af;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #020617;
        color: #e5e7eb;
        margin-top: 4px;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(to right, #4f46e5, #06b6d4);
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #020617;
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #1f2937;
        max-height: 480px;
        overflow: auto;
      }
      .status {
        font-size: 13px;
        margin-top: 8px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <h1>VLAPlus Web Scene Viewer</h1>
    <p style="color: #9ca3af; margin-top: 0">
      打开摄像头，点击「分析当前画面」，后端会调用 VLAPlus.analyze_scene 返回场景理解结果。
    </p>

    <div class="container">
      <div class="panel">
        <label for="question">问题（可修改）：</label>
        <input
          id="question"
          type="text"
          value="画面里面有什么？"
          autocomplete="off"
        />

        <button id="analyze-btn" disabled>初始化摄像头中...</button>
        <div id="status" class="status"></div>
      </div>

      <div class="panel">
        <h2 style="margin-top: 0; font-size: 16px">分析结果</h2>
        <pre id="result">尚未分析</pre>
      </div>
    </div>

    <script>
      const video = document.getElementById("video");
      const questionInput = document.getElementById("question");
      const analyzeBtn = document.getElementById("analyze-btn");
      const resultEl = document.getElementById("result");
      const statusEl = document.getElementById("status");

      async function analyzeFrame() {
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "分析中...";
        statusEl.textContent = "正在调用后端 USB 摄像头进行分析...";

        try {
          const formData = new FormData();
          formData.append(
            "question",
            questionInput.value || "画面里面有什么？"
          );

          const resp = await fetch("/analyze", {
            method: "POST",
            body: formData,
          });

          if (!resp.ok) {
            const text = await resp.text();
            throw new Error(`HTTP ${resp.status}: ${text}`);
          }

          const data = await resp.json();
          resultEl.textContent = JSON.stringify(data, null, 2);
          statusEl.textContent = "分析完成。";
        } catch (err) {
          console.error(err);
          statusEl.textContent = "分析失败，请查看控制台信息。";
        } finally {
          analyzeBtn.disabled = false;
          analyzeBtn.textContent = "分析当前画面";
        }
      }

      analyzeBtn.addEventListener("click", analyzeFrame);
      // 不再依赖浏览器摄像头，改由后端 USB 摄像头采集
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = "分析当前画面";
      statusEl.textContent = "点击按钮后，将使用服务器上的 USB 摄像头采集当前帧并分析。";
    </script>
  </body>
  </html>
